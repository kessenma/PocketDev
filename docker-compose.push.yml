services:
  gorush-init:
    image: alpine:latest
    restart: "no"
    environment:
      APNS_KEY_BASE64: ${APNS_KEY_BASE64}
    volumes:
      - apns-keys:/keys
    networks:
      - coolify
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Decoding APNs key...' &&
      if [ -n \"$$APNS_KEY_BASE64\" ]; then
        echo \"$$APNS_KEY_BASE64\" | base64 -d > /keys/AuthKey.p8 &&
        chmod 644 /keys/AuthKey.p8 &&
        echo 'APNs key ready.'
      else
        echo 'ERROR: APNS_KEY_BASE64 not set' && exit 1
      fi
      "

  gorush:
    image: appleboy/gorush:latest
    depends_on:
      gorush-init:
        condition: service_completed_successfully
    restart: always
    volumes:
      - apns-keys:/keys:ro
    environment:
      GORUSH_CORE_PORT: "8088"
      GORUSH_CORE_MODE: "release"
      GORUSH_CORE_SYNC: "false"
      GORUSH_CORE_MAX_NOTIFICATION: "1000"
      GORUSH_IOS_ENABLED: "true"
      GORUSH_IOS_KEY_PATH: "/keys/AuthKey.p8"
      GORUSH_IOS_KEY_TYPE: "p8"
      GORUSH_IOS_KEY_ID: ${APNS_KEY_ID}
      GORUSH_IOS_TEAM_ID: ${APNS_TEAM_ID}
      GORUSH_IOS_PRODUCTION: "true"
      GORUSH_IOS_MAX_RETRY: "3"
      GORUSH_ANDROID_ENABLED: "false"
    networks:
      - coolify
    # Port 8088 is internal only — NOT exposed externally.
    # The web app container reaches gorush via Docker network at http://gorush:8088

volumes:
  apns-keys:

networks:
  coolify:
    external: true
