name: Release Agent Bundle

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: cd packages/shared && npx tsc -p tsconfig.build.json

      - name: Build agent bundle
        env:
          AGENT_VERSION: ${{ github.ref_name }}
        run: bash scripts/build-agent-bundle.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          gh release create "$VERSION" \
            --title "PocketDev Agent $VERSION" \
            --notes "Stable agent release $VERSION" \
            "apps/web/public/agent-bundle.tar.gz#agent-bundle.tar.gz" \
            "apps/web/public/agent-versions/${VERSION_NUM}.tar.gz#${VERSION_NUM}.tar.gz"

      - name: Commit VERSION file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NUM="${{ github.ref_name }}"
          VERSION_NUM="${VERSION_NUM#v}"
          echo "$VERSION_NUM" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --staged --quiet || git commit -m "chore: stable release $VERSION_NUM"
          git push origin HEAD:main
