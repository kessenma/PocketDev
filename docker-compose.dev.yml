services:
  # PocketDev agent with hot reload
  agent:
    image: oven/bun:1
    working_dir: /app
    command: bun --watch src/index.ts
    ports:
      - "4387:4387"
    volumes:
      - ./apps/agent:/app
      - ./packages/shared:/shared
      - agent_data:/app/data
    environment:
      - POCKETDEV_PORT=4387
      - POCKETDEV_DEV_MODE=1
      - POCKETDEV_PROJECT_DIR=/project
      - POCKETDEV_DEV_PORT=5173
    depends_on:
      - sample-app

  # Sample Vite React app for testing the edit-preview loop
  sample-app:
    image: node:22-alpine
    working_dir: /project
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - sample_project:/project
    environment:
      - NODE_ENV=development

  # Simulated remote server for testing pairing + SSH workflows
  testing-host:
    image: debian:12-slim
    command: >
      bash -c "
        apt-get update && apt-get install -y curl git &&
        curl -fsSL https://bun.sh/install | bash &&
        tail -f /dev/null
      "
    volumes:
      - testing_data:/home/dev

volumes:
  agent_data:
  sample_project:
  testing_data:
