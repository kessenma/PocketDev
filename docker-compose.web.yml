services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-https://pocketdev.run}
    restart: always
    env_file:
      - .env
    volumes:
      - ./apps/web/install.sh:/app/apps/web/install.sh:ro
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VITE_APP_URL: ${VITE_APP_URL}
