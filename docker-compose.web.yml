services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-https://pocketdev.run}
    restart: always
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      VITE_APP_URL: ${VITE_APP_URL}
      GORUSH_URL: ${GORUSH_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
    networks:
      - coolify

networks:
  coolify:
    external: true
