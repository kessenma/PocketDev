core:
  port: "8088"
  max_notification: 1000
  sync: false
  mode: "release"

ios:
  enabled: true
  key_path: "/keys/AuthKey.p8"
  key_type: "p8"
  key_id: "${APNS_KEY_ID}"
  team_id: "${APNS_TEAM_ID}"
  production: true
  max_retry: 3
  max_concurrent_pushes: 100

android:
  enabled: false
  key_path: ""

huawei:
  enabled: false

queue:
  engine: "local"

stat:
  engine: "memory"
